name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit Apps
        run: |
          curl -s https://visualx-lab-double-pendulum.streamlit.app/_stcore/health > /dev/null 2>&1
          curl -s https://visualx-lab-electronic-configuration.streamlit.app/_stcore/health > /dev/null 2>&1
          curl -s https://visualx-lab-lissajous.streamlit.app/_stcore/health > /dev/null 2>&1
          echo "Ping successful!"
