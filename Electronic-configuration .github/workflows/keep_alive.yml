name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -sL https://visualx-lab-electronic-configuration.streamlit.app > /dev/null 2>&1
          echo "Ping successful!"
